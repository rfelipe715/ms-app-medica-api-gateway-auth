server:
  port: 8080

jwt:
  secret: "app-medica-duoc-2026"
  expiration-minutes: 60

spring:
  application:
    name: ms-api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: pacientes-bff
              uri: http://localhost:8181
              predicates:
                - Path=/api/v1/pacientes/**

            - id: citas-bff
              uri: http://localhost:8090
              predicates:
                - Path=/api/v1/citas/**

            - id: historial-bff
              uri: http://localhost:9090
              predicates:
                - Path=/api/v1/historiales/**